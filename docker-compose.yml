version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: brend_druze_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: brend_druze
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql 
      
volumes:
  postgres_data: